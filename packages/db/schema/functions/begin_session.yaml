name: begin_session
language: plpgsql
returns: void
replace: true
security: definer
args:
  - name: p_role
    type: text
  - name: p_user_id
    type: text
  - name: p_tenant_id
    type: text
    default: "''"
  - name: p_is_super_admin
    type: text
    default: "'false'"
body: |
  BEGIN
    EXECUTE format('set local role %I', p_role);
    PERFORM set_config('app.user_id', p_user_id, true);
    IF p_tenant_id <> '' THEN
      PERFORM set_config('app.tenant_id', p_tenant_id, true);
    END IF;
    PERFORM set_config('app.is_super_admin', p_is_super_admin, true);
  END;
grants:
  - to: authenticator
    privileges: [EXECUTE]
