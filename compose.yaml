services:
  postgres:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: simplicity
      POSTGRES_PASSWORD: simplicity
      POSTGRES_DB: simplicity_admin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplicity -d simplicity_admin"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
