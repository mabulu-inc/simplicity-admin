name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: simplicity
          POSTGRES_PASSWORD: simplicity
          POSTGRES_DB: simplicity_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U simplicity -d simplicity_admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://simplicity:simplicity@localhost:5432/simplicity_admin

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - run: pnpm check

      - name: Build docs site
        working-directory: docs-site
        run: pnpm install --ignore-workspace && pnpm build
